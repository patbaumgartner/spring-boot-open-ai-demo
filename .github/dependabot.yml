version: 2
updates:
- package-ecosystem: maven
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: 06:00
    timezone: Europe/Zurich
  open-pull-requests-limit: 10
  groups:
    spring:
      patterns:
      - org.springframework*
    junit:
      patterns:
      - org.junit*
  commit-message:
    prefix: chore(deps)
    prefix-development: chore(deps-dev)
  labels:
  - dependencies
  - maven
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: 06:00
    timezone: Europe/Zurich
  open-pull-requests-limit: 5
  labels:
  - dependencies
  - github-actions
  commit-message:
    prefix: ci(deps)
    include: scope